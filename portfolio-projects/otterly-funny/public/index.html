<!DOCTYPE html>
<html lang="en">
<head>
  <script src="../script.js" defer></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Otterly Funny Jokes! | Portfolio Project</title>
  <style>
    /* Global Styles */
    :root {
      --bg-color: #121212;         /* Darker, almost-black gray background */
      --otter-primary: #3772ff;    /* Deep cobalt blue */
      --otter-accent: #70e4ef;     /* Vibrant cyan */
      --text-pink: #ef70d9;        /* Neon pink-magenta */
      --text-lime: #e2ef70;        /* Contrasting lime-yellow */
      --card-bg: #1c1c1c;          /* Inner container card color */
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background-color: var(--bg-color);
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 20px;
      overflow-x: hidden;
    }

    header {
      text-align: center;
      margin-top: 10px;
      margin-bottom: 20px;
    }

    header h1 {
      color: var(--text-pink);
      font-size: 2.5rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-shadow: 0 0 10px rgba(239, 112, 217, 0.4);
      margin-bottom: 5px;
    }

    header p {
      color: var(--otter-accent);
      font-size: 1.1rem;
      font-weight: 500;
    }

    /* Main Responsive Container */
    .app-container {
      display: grid;
      grid-template-columns: 1fr;
      gap: 30px;
      width: 100%;
      max-width: 900px;
      align-items: center;
      justify-items: center;
      flex-grow: 1;
    }

    /* Media query for larger tablet and desktop viewports */
    @media (min-width: 768px) {
      .app-container {
        grid-template-columns: 1fr 1fr;
        padding: 20px;
      }
    }

    /* Otter Vector Styling */
    .otter-wrapper {
      position: relative;
      width: 280px;
      height: 350px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .otter-svg {
      width: 100%;
      height: 100%;
      transition: transform 0.3s ease;
    }

    /* Keyframe Animations */
    @keyframes otterIdle {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    @keyframes otterLaugh {
      0%, 100% { transform: scale(1) translateY(0); }
      20% { transform: scale(1.05) translateY(-15px) rotate(-3deg); }
      40% { transform: scale(0.98) translateY(2px) rotate(3deg); }
      60% { transform: scale(1.05) translateY(-10px) rotate(-3deg); }
      80% { transform: scale(0.98) translateY(2px) rotate(1deg); }
    }

    @keyframes whiskerTwitch {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(4deg); }
    }

    .otter-idle {
      animation: otterIdle 4s ease-in-out infinite;
    }

    .otter-laughing {
      animation: otterLaugh 1.2s ease-in-out !important;
    }

    .whisker-left {
      transform-origin: 110px 105px;
      animation: whiskerTwitch 3s ease-in-out infinite;
    }
    
    .whisker-right {
      transform-origin: 140px 105px;
      animation: whiskerTwitch 3s ease-in-out infinite reverse;
    }

    /* Display / Interaction Panel */
    .display-panel {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      justify-content: center;
    }

    /* Dialogue bubble styling */
    .joke-bubble {
      background-color: var(--card-bg);
      border: 3px solid var(--otter-accent);
      border-radius: 20px;
      padding: 25px;
      position: relative;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.6), 
                  0 0 15px rgba(112, 228, 239, 0.15);
      min-height: 160px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      transition: all 0.3s ease;
    }

    /* Speech Bubble Tail (visible only on desktop side-by-side) */
    @media (min-width: 768px) {
      .joke-bubble::after {
        content: '';
        position: absolute;
        left: -15px;
        top: 50%;
        transform: translateY(-50%) rotate(45deg);
        width: 25px;
        height: 25px;
        background-color: var(--card-bg);
        border-left: 3px solid var(--otter-accent);
        border-bottom: 3px solid var(--otter-accent);
      }
    }

    .joke-category {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--otter-accent);
      margin-bottom: 10px;
      font-weight: bold;
    }

    .joke-setup {
      color: var(--text-lime);
      font-size: 1.3rem;
      font-weight: 600;
      line-height: 1.4;
      margin-bottom: 12px;
    }

    .joke-punchline {
      color: var(--text-pink);
      font-size: 1.25rem;
      font-weight: 700;
      line-height: 1.4;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .joke-punchline.revealed {
      opacity: 1;
      transform: translateY(0);
    }

    /* Button Layout Container */
    .btn-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
    }

    /* Alignment rules for screen breaking points */
    @media (min-width: 480px) {
      .btn-container {
        flex-direction: row;
      }
      .joke-btn {
        flex: 1;        /* Stretches to occupy the rest of the layout width */
      }
      .exit-btn {
        flex: 0 0 auto; /* Compact custom size based purely on text length */
      }
    }

    /* Interactive Joke Button base */
    .joke-btn {
      background-color: var(--card-bg);
      border: 3px solid var(--text-pink);
      border-radius: 50px;
      color: var(--text-lime);
      font-size: 1.2rem;
      font-weight: bold;
      padding: 16px 30px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      outline: none;
      box-shadow: 0 5px 15px rgba(239, 112, 217, 0.15), 
                  inset 0 0 10px rgba(239, 112, 217, 0.05);
    }

    .joke-btn:hover {
      transform: translateY(-3px);
      background-color: var(--text-pink);
      color: var(--card-bg);
      box-shadow: 0 8px 25px rgba(239, 112, 217, 0.4);
    }

    .joke-btn:active {
      transform: translateY(1px);
    }

    /* Interactive Exit Button (Matches size/feel of joke-btn but in Gray) */
    .exit-btn {
      background-color: var(--card-bg);
      border: 3px solid #666666; 
      border-radius: 50px;
      color: #cccccc; 
      font-size: 1.2rem;
      font-weight: bold;
      padding: 16px 30px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      outline: none;
      box-shadow: 0 5px 15px rgba(102, 102, 102, 0.15), 
                  inset 0 0 10px rgba(102, 102, 102, 0.05);
      
      /* Align SVG door icon inside the button bounds */
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .exit-btn:hover {
      transform: translateY(-3px);
      background-color: #555555;
      color: #ffffff;
      border-color: #888888;
      box-shadow: 0 8px 25px rgba(102, 102, 102, 0.4);
    }

    .exit-btn:active {
      transform: translateY(1px);
    }

    .exit-icon {
      width: 20px;
      height: 20px;
    }

    footer {
      font-size: 0.85rem;
      color: #666;
      margin-top: 30px;
      text-align: center;
    }

    footer a {
      color: var(--otter-accent);
      text-decoration: none;
    }
  
  </style>
</head>
<body>
  <header>
    <h1>Otterly Funny</h1>
    <p>Your Daily Dose of Wholesome Otter Humor!</p>
  </header>

  <main class="app-container">
    
    <div class="otter-wrapper">
      <svg class="otter-svg otter-idle" viewBox="0 0 250 350" xmlns="http://www.w3.org/2000/svg">
        <defs>

          </filter>
        </defs>

        <ellipse cx="125" cy="330" rx="60" ry="12" fill="none" stroke="#70e4ef" stroke-width="2" opacity="0.3" />
        <ellipse cx="125" cy="330" rx="90" ry="18" fill="none" stroke="#70e4ef" stroke-width="1.5" opacity="0.1" />

        <path d="M 60 280 C 10 280, 20 330, 70 325 C 80 323, 75 300, 70 290 Z" fill="#3772ff" stroke="#1d4ebd" stroke-width="2" />

        <ellipse cx="90" cy="328" rx="18" ry="10" fill="#3772ff" />
        <ellipse cx="160" cy="328" rx="18" ry="10" fill="#3772ff" />
        <path d="M 78 328 Q 90 338 102 328" stroke="#1d4ebd" stroke-width="1.5" fill="none" />
        <path d="M 148 328 Q 160 338 172 328" stroke="#1d4ebd" stroke-width="1.5" fill="none" />

        <path d="M 80 160 C 65 240, 75 310, 100 320 L 150 320 C 175 310, 185 240, 170 160 Z" fill="#3772ff" />

        <path d="M 95 170 C 85 220, 90 300, 125 300 C 160 300, 165 220, 155 170 Z" fill="#70e4ef" />

        <path d="M 80 170 C 65 185, 75 220, 95 210 C 105 205, 95 185, 90 175 Z" fill="#3772ff" />
        <path d="M 170 170 C 185 185, 175 220, 155 210 C 145 205, 155 185, 160 175 Z" fill="#3772ff" />

        <circle cx="125" cy="115" r="55" fill="#3772ff" />

        <circle cx="75" cy="75" r="14" fill="#3772ff" />
        <circle cx="75" cy="75" r="8" fill="#70e4ef" />
        
        <circle cx="175" cy="75" r="14" fill="#3772ff" />
        <circle cx="175" cy="75" r="8" fill="#70e4ef" />

        <path d="M 85 115 C 85 145, 165 145, 165 115 C 165 95, 85 95, 85 115 Z" fill="#70e4ef" />

        <circle cx="105" cy="105" r="6" fill="#111111" />
        <circle cx="103" cy="103" r="2" fill="#ffffff" />
        
        <circle cx="145" cy="105" r="6" fill="#111111" />
        <circle cx="143" cy="103" r="2" fill="#ffffff" />

        <circle cx="92" cy="115" r="5" fill="#ef70d9" opacity="0.6" />
        <circle cx="158" cy="115" r="5" fill="#ef70d9" opacity="0.6" />

        <g class="whisker-left">
          <line x1="90" x2="60" y1="115" y2="110" stroke="#ffffff" stroke-width="1.5" />
          <line x1="90" x2="55" y1="120" y2="120" stroke="#ffffff" stroke-width="1.5" />
          <line x1="90" x2="60" y1="125" y2="130" stroke="#ffffff" stroke-width="1.5" />
        </g>

        <g class="whisker-right">
          <line x1="160" x2="190" y1="115" y2="110" stroke="#ffffff" stroke-width="1.5" />
          <line x1="160" x2="195" y1="120" y2="120" stroke="#ffffff" stroke-width="1.5" />
          <line x1="160" x2="190" y1="125" y2="130" stroke="#ffffff" stroke-width="1.5" />
        </g>

        <path d="M 120 110 L 130 110 C 133 110, 128 118, 125 118 C 122 118, 117 110, 120 110 Z" fill="#111111" />

        <path id="otter-mouth" d="M 115 120 Q 125 130 135 120" fill="none" stroke="#111111" stroke-width="2.5" stroke-linecap="round" />

        <circle cx="50" cy="80" r="7" fill="none" stroke="#70e4ef" stroke-width="1.5" opacity="0.7" filter="url(#glow)" />
        <circle cx="40" cy="110" r="4" fill="none" stroke="#70e4ef" stroke-width="1.5" opacity="0.5" filter="url(#glow)" />
        <circle cx="205" cy="180" r="8" fill="none" stroke="#70e4ef" stroke-width="1.5" opacity="0.6" filter="url(#glow)" />
      </svg>
    </div>

    <div class="display-panel">
      <div class="joke-bubble">
        <div id="category" class="joke-category">Ready?</div>
        <div id="setup" class="joke-setup">Press the button and I otterly promise to make you laugh!</div>
        <div id="punchline" class="joke-punchline"></div>
      </div>

      <div class="btn-container">
        <button id="joke-btn" class="joke-btn">You Otter Tell Me a Joke</button>
        <button id="exit-btn" class="exit-btn">
          <svg class="exit-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
          EXIT
        </button>
      </div>
    </div>

  </main>

  <footer>
    <p>Created by Tamara O.<br>Powered by the <a href="/api/jokes/random" target="_blank">"Otterly Funny Jokes" API</a><br><a href="https://hiretamara.com/">Back to Portfolio</a></p>
  </footer>


</body>
</html>
