<!DOCTYPE html>
<html lang="en">
<head>

  <link rel="stylesheet" type="text/css" href="../assets/style/style.css">

<body>
  <header>

        </defs>

        <ellipse cx="125" cy="330" rx="60" ry="12" fill="none" stroke="#70e4ef" stroke-width="2" opacity="0.3" />

        <path d="M 60 280 C 10 280, 20 330, 70 325 C 80 323, 75 300, 70 290 Z" fill="#3772ff" stroke="#1d4ebd" stroke-width="2" />

        <ellipse cx="90" cy="328" rx="18" ry="10" fill="#3772ff" />

        <path d="M 148 328 Q 160 338 172 328" stroke="#1d4ebd" stroke-width="1.5" fill="none" />

        <path d="M 80 160 C 65 240, 75 310, 100 320 L 150 320 C 175 310, 185 240, 170 160 Z" fill="#3772ff" />

        <circle cx="75" cy="75" r="14" fill="#3772ff" />
        <circle cx="75" cy="75" r="8" fill="#70e4ef" />
        
        <circle cx="175" cy="75" r="14" fill="#3772ff" />
        <circle cx="175" cy="75" r="8" fill="#70e4ef" />

        <path d="M 85 115 C 85 145, 165 145, 165 115 C 165 95, 85 95, 85 115 Z" fill="#70e4ef" />

        <circle cx="105" cy="105" r="6" fill="#111111" />
        <circle cx="103" cy="103" r="2" fill="#ffffff" />
        
        <circle cx="145" cy="105" r="6" fill="#111111" />
        <circle cx="143" cy="103" r="2" fill="#ffffff" />

        <circle cx="158" cy="115" r="5" fill="#ef70d9" opacity="0.6" />

          <line x1="90" x2="60" y1="115" y2="110" stroke="#ffffff" stroke-width="1.5" />
          <line x1="90" x2="55" y1="120" y2="120" stroke="#ffffff" stroke-width="1.5" />
          <line x1="90" x2="60" y1="125" y2="130" stroke="#ffffff" stroke-width="1.5" />
        </g>

        <g class="whisker-right">
          <line x1="160" x2="190" y1="115" y2="110" stroke="#ffffff" stroke-width="1.5" />
          <line x1="160" x2="195" y1="120" y2="120" stroke="#ffffff" stroke-width="1.5" />
          <line x1="160" x2="190" y1="125" y2="130" stroke="#ffffff" stroke-width="1.5" />
        </g>

        <path d="M 120 110 L 130 110 C 133 110, 128 118, 125 118 C 122 118, 117 110, 120 110 Z" fill="#111111" />

        <path id="otter-mouth" d="M 115 120 Q 125 130 135 120" fill="none" stroke="#111111" stroke-width="2.5" stroke-linecap="round" />

        <circle cx="50" cy="80" r="7" fill="none" stroke="#70e4ef" stroke-width="1.5" opacity="0.7" filter="url(#glow)" />
        <circle cx="40" cy="110" r="4" fill="none" stroke="#70e4ef" stroke-width="1.5" opacity="0.5" filter="url(#glow)" />
        <circle cx="205" cy="180" r="8" fill="none" stroke="#70e4ef" stroke-width="1.5" opacity="0.6" filter="url(#glow)" />
      </svg>
    </div>

    <div class="display-panel">
      <div class="joke-bubble">
        <div id="category" class="joke-category">Ready?</div>
        <div id="setup" class="joke-setup">Press the button and I otterly promise to make you laugh!</div>
        <div id="punchline" class="joke-punchline"></div>
      </div>

      <div class="btn-container">
        <button id="joke-btn" class="joke-btn">You Otter Tell Me a Joke</button>
        <button id="exit-btn" class="exit-btn">
          <svg class="exit-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>

  <footer>
